<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컴퓨터부품 전체 조감도 — 메인보드</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0c0c14;
  color: #e0e0e0;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Title ── */
header {
  text-align: center;
  padding: 48px 20px 24px;
}
header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  color: #c8d6e5;
  letter-spacing: 1px;
}
header p {
  color: #556;
  font-size: 0.85rem;
  margin-top: 8px;
}
.hint {
  color: #445;
  font-size: 0.75rem;
  margin-top: 20px;
  animation: blink 2s infinite;
}
@keyframes blink {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ── Board Container ── */
.board-wrap {
  position: relative;
  margin: 20px auto 40px;
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.board-wrap.shifted {
  transform: translateX(-190px);
}

/* ── SVG Board ── */
.motherboard {
  display: block;
  filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
}

/* ── Interactive hotspots ── */
.hotspot {
  cursor: pointer;
  transition: filter 0.3s, opacity 0.3s;
}
.hotspot:hover { filter: brightness(1.6) drop-shadow(0 0 12px var(--glow)); }
.hotspot.active { filter: brightness(1.8) drop-shadow(0 0 20px var(--glow)); }

/* ── Tooltip ── */
.tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(12, 12, 20, 0.95);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px 14px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.25s, transform 0.25s;
  z-index: 50;
  white-space: nowrap;
}
.tooltip.show {
  opacity: 1;
  transform: translateY(0);
}
.tooltip .tt-name { font-weight: 700; font-size: 0.85rem; }
.tooltip .tt-eng { font-size: 0.7rem; color: #888; }
.tooltip .tt-hint { font-size: 0.65rem; color: #556; margin-top: 4px; }

/* ── Detail Side Panel ── */
.detail-panel {
  position: fixed;
  top: 0; right: 0;
  width: 380px;
  height: 100vh;
  overflow-y: auto;
  background: rgba(14, 14, 22, 0.97);
  backdrop-filter: blur(16px);
  border-left: 1px solid rgba(255,255,255,0.08);
  padding: 28px 24px;
  z-index: 210;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.detail-panel.open {
  transform: translateX(0);
}

.detail-panel .close-btn {
  position: sticky;
  top: 0; float: right;
  background: rgba(14, 14, 22, 0.8);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: #666; font-size: 1.2rem;
  cursor: pointer;
  line-height: 1;
  padding: 4px 10px;
  z-index: 5;
}
.detail-panel .close-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }

.detail-panel h2 { font-size: 1.2rem; font-weight: 700; clear: both; padding-top: 4px; }
.detail-panel .sub { color: #777; font-size: 0.82rem; margin: 4px 0 18px; }

.framework-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 18px;
}
.fw-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 14px;
}
.fw-card .fw-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #777;
  margin-bottom: 6px;
}
.fw-card .fw-val { font-size: 0.82rem; line-height: 1.5; color: #bbb; }

.be-section {
  background: rgba(52,211,153,0.06);
  border: 1px solid rgba(52,211,153,0.12);
  border-radius: 10px;
  padding: 16px;
}
.be-section h3 { font-size: 0.82rem; color: #34d399; margin-bottom: 10px; }
.be-section ul { list-style: none; }
.be-section li {
  font-size: 0.8rem; color: #999; line-height: 1.6;
  padding-left: 14px; position: relative;
}
.be-section li::before { content: '>'; position: absolute; left: 0; color: #34d399; }

/* ── Data pulse on traces ── */
@keyframes tracePulse {
  0% { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: -40; }
}
.trace-animated {
  stroke-dasharray: 8 12;
  animation: tracePulse 1.5s linear infinite;
}

/* ── Responsive ── */
@media (max-width: 800px) {
  .motherboard { width: 95vw; height: auto; }
  .framework-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>MOTHERBOARD — 컴퓨터부품 전체 조감도</h1>
  <p>5대 핵심 부품이 하나의 보드 위에서 협력한다</p>
  <div class="hint">부품 위에 마우스를 올려보세요</div>

<div class="board-wrap">

    <!-- ═══════════ CPU Socket ═══════════ -->

        <line x1="132" y1="310" x2="248" y2="310" stroke="#333" stroke-width="0.3" stroke-dasharray="3,3"/>
      </g>
      <!-- Socket retention bracket -->
      <rect x="116" y="186" width="148" height="4" rx="1" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
      <rect x="116" y="330" width="148" height="4" rx="1" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
      <!-- Lever -->
      <rect x="112" y="240" width="6" height="50" rx="2" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
      <!-- Label -->

      <text x="190" y="367" fill="rgba(255,255,255,0.1)" font-size="7" font-family="monospace" text-anchor="middle">LGA 1700</text>
      <!-- Corner triangle (pin 1 marker) -->
      <polygon points="130,200 142,200 130,212" fill="rgba(255,107,107,0.3)"/>
    </g>

      <rect x="363" y="180" width="10" height="12" rx="1" fill="#0d1a0d" stroke="#1a3a1a" stroke-width="0.5"/>

  bus:     { svgX: 420, svgY: 340, align: 'center' },   // below bus traces
  storage: { svgX: 600, svgY: 480, align: 'left' },     // right of SATA
  io:      { svgX: 680, svgY: 28,  align: 'center' }    // above I/O panel
};

function positionTooltip(id) {
  const anchor = tooltipAnchors[id];
  const svg = document.querySelector('.motherboard');
  const wrap = document.querySelector('.board-wrap');
  const svgRect = svg.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();

  const scaleX = svgRect.width / 800;  // viewBox width
  const scaleY = svgRect.height / 680; // viewBox height

  const screenX = svgRect.left - wrapRect.left + anchor.svgX * scaleX;
  const screenY = svgRect.top - wrapRect.top + anchor.svgY * scaleY;

  const ttW = tooltip.offsetWidth;

  let left;
  if (anchor.align === 'right') {
    left = screenX - ttW - 8;
  } else if (anchor.align === 'left') {
    left = screenX + 8;
  } else {
    left = screenX - ttW / 2;
  }

  tooltip.style.left = left + 'px';
  tooltip.style.top = screenY + 'px';
}

document.querySelectorAll('.hotspot').forEach(el => {
  const id = el.dataset.id;

  el.addEventListener('mouseenter', () => {
    ttName.textContent = labels[id][0];
    ttEng.textContent = labels[id][1];
    tooltip.classList.add('show');
    requestAnimationFrame(() => positionTooltip(id));
  });

  el.addEventListener('mouseleave', () => {
    tooltip.classList.remove('show');
  });
});

// ── Detail Panel ──
function showDetail(id) {
  const d = data[id];
  document.getElementById('dTitle').textContent = d.title;
  document.getElementById('dTitle').style.color = d.color;
  document.getElementById('dSub').textContent = d.sub;
  document.getElementById('dFw').innerHTML = d.fw.map(f =>
    `<div class="fw-card"><div class="fw-label">${f.l}</div><div class="fw-val">${f.v}</div></div>`
  ).join('');
  document.getElementById('dBe').innerHTML =
    `<h3>백엔드 개발에서의 활용</h3><ul>${d.be.map(b => `<li>${b}</li>`).join('')}</ul>`;

  // Highlight active hotspot
  document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
  document.querySelector(`.hotspot[data-id="${id}"]`).classList.add('active');

  document.getElementById('detailPanel').classList.add('open');
  document.querySelector('.board-wrap').classList.add('shifted');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelector('.board-wrap').classList.remove('shifted');
  document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
</script>
