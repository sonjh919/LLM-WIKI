<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컴퓨터구조 빌드업 — 빈 캔버스에서 조감도까지</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0c0c14;
  color: #e0e0e0;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
}

/* ── Header ── */
header {
  text-align: center;
  margin-bottom: 18px;
  max-width: 920px;
}
header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  color: #c8d6e5;
  letter-spacing: 0.5px;
}
header .lead {
  color: #667;
  font-size: 0.82rem;
  margin-top: 6px;
}
header .principle {
  color: #889;
  font-size: 0.74rem;
  margin-top: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 8px 14px;
  display: inline-block;
}
header .principle b { color: #ffcc66; }

/* ── Phase Indicator ── */
.phase-bar {
  display: flex;
  gap: 0;
  align-items: center;
  margin-bottom: 22px;
}
.phase-pill {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #667;
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
  transition: all 0.3s;
}
.phase-pill.active {
  background: rgba(255,204,102,0.12);
  border-color: rgba(255,204,102,0.4);
  color: #ffd98a;
  box-shadow: 0 0 16px rgba(255,204,102,0.15);
}
.phase-pill.done {
  background: rgba(52,211,153,0.08);
  border-color: rgba(52,211,153,0.3);
  color: #7ee0c8;
}
.phase-pill.locked { opacity: 0.4; }
.phase-arrow {
  color: #334;
  font-size: 0.85rem;
  padding: 0 8px;
}

/* ── Stage (SVG canvas) ── */
.stage-wrap {
  width: 100%;
  max-width: 920px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.005));
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 18px;
  position: relative;
  min-height: 380px;
}
.stage-wrap::before {
  content: attr(data-step-label);
  position: absolute;
  top: 12px;
  right: 16px;
  color: #445;
  font-size: 0.7rem;
  font-family: 'SF Mono', monospace;
  letter-spacing: 1px;
}
.stage {
  width: 100%;
  height: 360px;
  display: block;
}

/* SVG element transitions */
.stage * { transition: opacity 0.5s, transform 0.5s; }
.fade-hidden { opacity: 0 !important; pointer-events: none; }
.fade-in     { opacity: 1; }

/* ── Question Panel ── */
.qa-panel {
  width: 100%;
  max-width: 920px;
  background: rgba(14,14,22,0.6);
  border: 1px solid rgba(255,204,102,0.18);
  border-radius: 14px;
  padding: 20px 22px;
}
.q-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}
.q-label {
  background: rgba(255,204,102,0.15);
  color: #ffcc66;
  font-size: 0.66rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  padding: 4px 9px;
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
}
.q-label.transition { background: rgba(199,146,234,0.15); color: #c792ea; }
.q-text {
  color: #e6d9a8;
  font-size: 1.02rem;
  font-weight: 500;
  line-height: 1.5;
}
.q-text.transition { color: #dbb5ee; }

/* ── Answer Input ── */
.answer-input-wrap {
  margin-top: 4px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 12px 14px;
}
.answer-input-label {
  font-size: 0.72rem;
  color: #889;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.answer-input-label .hint {
  color: #556;
  font-size: 0.68rem;
  font-style: italic;
}
.answer-textarea {
  width: 100%;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,204,102,0.18);
  border-radius: 6px;
  padding: 10px 12px;
  color: #e6d9a8;
  font-family: inherit;
  font-size: 0.92rem;
  line-height: 1.55;
  resize: vertical;
  min-height: 70px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.answer-textarea::placeholder { color: #445; font-style: italic; }
.answer-textarea:focus {
  border-color: rgba(255,204,102,0.5);
  background: rgba(0,0,0,0.35);
}
.answer-textarea:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  border-color: rgba(255,255,255,0.06);
}
.input-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  align-items: center;
}
.submit-btn {
  background: linear-gradient(180deg, rgba(52,211,153,0.18), rgba(52,211,153,0.08));
  border: 1px solid rgba(52,211,153,0.4);
  color: #a6f0dc;
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.84rem;
  font-weight: 500;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.submit-btn:hover {
  background: linear-gradient(180deg, rgba(52,211,153,0.28), rgba(52,211,153,0.14));
  color: #c8f5e2;
  transform: translateY(-1px);
}
.submit-btn .ico { font-size: 1rem; }
.submit-hint {
  font-size: 0.7rem;
  color: #556;
  font-style: italic;
}

/* ── Answer Reveal Block ── */
.answer-block {
  margin-top: 14px;
  display: none;
}
.answer-block.show { display: block; animation: slideIn 0.4s ease; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.answer-comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.cmp-card {
  border-radius: 10px;
  padding: 12px 14px;
  border: 1px solid;
}
.cmp-card.mine {
  background: rgba(255,153,136,0.05);
  border-color: rgba(255,153,136,0.3);
}
.cmp-card.actual {
  background: rgba(52,211,153,0.06);
  border-color: rgba(52,211,153,0.35);
}
.cmp-label {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.cmp-card.mine  .cmp-label { color: #ff9988; }
.cmp-card.actual .cmp-label { color: #34d399; }
.cmp-text {
  color: #d6e4dc;
  font-size: 0.9rem;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.cmp-card.mine .cmp-text { color: #e6c8c4; font-style: italic; }
.cmp-card.mine .cmp-text.skipped { color: #556; font-style: italic; opacity: 0.7; }
.cmp-text b { color: #a6f0dc; font-weight: 600; }

@media (max-width: 700px) {
  .answer-comparison { grid-template-columns: 1fr; }
}

.meta-note {
  background: rgba(199,146,234,0.05);
  border-left: 2px solid rgba(199,146,234,0.4);
  padding: 10px 14px;
  border-radius: 0 8px 8px 0;
  margin-top: 10px;
  font-size: 0.82rem;
  color: #cbb8d6;
  line-height: 1.55;
}
.meta-note .meta-label {
  display: block;
  font-size: 0.62rem;
  color: #c792ea;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
  margin-bottom: 4px;
}

.next-btn {
  background: rgba(255,140,102,0.12);
  border: 1px solid rgba(255,140,102,0.4);
  color: #ffb599;
  padding: 9px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.84rem;
  font-weight: 500;
  margin-top: 14px;
  transition: all 0.2s;
}
.next-btn:hover {
  background: rgba(255,140,102,0.22);
  color: #ffd4c2;
  transform: translateY(-1px);
}
.next-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

/* ── Phase Complete Card ── */
.phase-complete {
  background: linear-gradient(180deg, rgba(52,211,153,0.08), rgba(52,211,153,0.02));
  border: 1px solid rgba(52,211,153,0.3);
  border-radius: 12px;
  padding: 18px 22px;
  margin-top: 14px;
  text-align: center;
}
.phase-complete h3 {
  color: #7ee0c8;
  font-size: 0.95rem;
  margin-bottom: 6px;
}
.phase-complete p { color: #889; font-size: 0.8rem; }

/* ── Reset ── */
.reset-row {
  margin-top: 22px;
  text-align: center;
}
.reset-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  color: #667;
  padding: 7px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.74rem;
  transition: all 0.2s;
}
.reset-btn:hover { color: #ccc; border-color: rgba(255,255,255,0.25); }

/* ── SVG Element Styles ── */
.area-label    { fill: #667; font-size: 11px; font-family: 'SF Mono', monospace; letter-spacing: 2px; font-weight: 600; }
.placeholder-box { fill: rgba(255,255,255,0.012); stroke: rgba(255,255,255,0.12); stroke-width: 1.5; stroke-dasharray: 6 5; }
.placeholder-box.highlight { stroke: #c792ea; stroke-width: 2.5; stroke-dasharray: 8 4; }
.placeholder-q   { fill: #334; font-size: 44px; font-weight: 800; font-family: 'SF Mono', monospace; }
.placeholder-q.highlight { fill: #c792ea; }
.placeholder-hint { fill: #445; font-size: 11px; }
.active-area   { fill: rgba(255,204,102,0.022); stroke: rgba(255,204,102,0.28); stroke-width: 1.5; stroke-dasharray: 6 5; }
.completed-area { fill: rgba(52,211,153,0.02); stroke: rgba(52,211,153,0.18); stroke-width: 1; stroke-dasharray: 4 4; }

.cpu-box       { fill: #1a0d0d; stroke: #ff6b6b; stroke-width: 2; }
.cpu-inner     { fill: #2a1414; stroke: rgba(255,107,107,0.5); }
.ram-box       { fill: #1a1408; stroke: #ffcc66; stroke-width: 2; }
.ram-cell      { fill: #2a200a; stroke: rgba(255,204,102,0.5); }
.storage-box   { fill: #0d1a14; stroke: #7ee0c8; stroke-width: 2; }

.legacy-circuit  { fill: rgba(120,60,60,0.15); stroke: rgba(255,107,107,0.4); stroke-width: 1.5; stroke-dasharray: 4 3; }
.legacy-label    { fill: #886; font-size: 11px; font-family: 'SF Mono', monospace; }
.legacy-warn     { fill: #ff7766; font-size: 13px; font-weight: 700; }

.label-name      { fill: #e0e0e0; font-size: 14px; font-weight: 700; }
.label-keyword   { fill: #ffcc66; font-size: 22px; font-weight: 800; letter-spacing: 1px; }
.label-keyword.cpu { fill: #ff8c66; }
.label-sub       { fill: #889; font-size: 11px; }
.label-data      { fill: #c8e0d6; font-size: 11px; font-family: 'SF Mono', monospace; }

.flow-arrow      { stroke: #ffcc66; stroke-width: 2; fill: none; marker-end: url(#arrow-y); }
.flow-arrow.bus  { stroke: #34d399; }
.flow-arrow.warn { stroke: #ff6b6b; stroke-dasharray: 6 4; }

.gap-marker      { fill: rgba(255,107,107,0.08); stroke: #ff6b6b; stroke-dasharray: 6 4; }

.help-text       { fill: #556; font-size: 12px; text-anchor: middle; }
.help-text.big   { fill: #889; font-size: 18px; font-weight: 600; }

@media (max-width: 700px) {
  .stage { height: 280px; }
  header h1 { font-size: 1.15rem; }
  .q-text { font-size: 0.92rem; }
}
</style>
</head>
<body>

<header>
  <h1>컴퓨터구조 빌드업</h1>
  <p class="lead">빈 캔버스에서 시작 → 질문에 답할 때마다 시각이 진화 → 마지막엔 조감도가 빌드된다</p>
  <div class="principle">
    원칙: <b>내 답을 입력하고 제출해야 시각이 변하고 실제 답이 보인다</b>. 그냥 보기는 학습이 아님.
  </div>
</header>

<!-- Phase Indicator -->
<div class="phase-bar" id="phaseBar">
  <span class="phase-pill active" data-phase="1">P1 · CPU</span>
  <span class="phase-arrow">→</span>
  <span class="phase-pill locked" data-phase="2">P2 · RAM</span>
  <span class="phase-arrow">→</span>
  <span class="phase-pill locked">P3+ · 잠김</span>
</div>

<!-- Stage -->
<div class="stage-wrap" id="stageWrap" data-step-label="P1 · STEP 0">
  <svg class="stage" viewBox="0 0 880 360" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow-y" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0,0 10,4 0,8" fill="#ffcc66"/>
      </marker>
      <marker id="arrow-g" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0,0 10,4 0,8" fill="#34d399"/>
      </marker>
      <marker id="arrow-r" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
        <polygon points="0,0 10,4 0,8" fill="#ff6b6b"/>
      </marker>
      <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
    </defs>

    <!-- ============================================================
         자리 기반 누적 구조: CPU 자리 + RAM 자리는 항상 무대 위에 있음.
         학습 상태(미학습/진행 중/완료)에 따라 각 자리 안에서만 시각이 변함.
         ============================================================ -->

    <!-- ===== Area Labels (always visible) ===== -->
    <text class="area-label" x="200" y="48" text-anchor="middle">[ 자리 1 · CPU ]</text>
    <text class="area-label" x="610" y="48" text-anchor="middle">[ 자리 2 · RAM ]</text>

    <!-- ============================================================
         CPU AREA  (x: 60~340, w: 280)
         ============================================================ -->

    <!-- placeholder: 미학습 -->
    <g id="cpu-placeholder">
      <rect class="placeholder-box" x="60" y="65" width="280" height="245" rx="10"/>
      <text class="placeholder-q" x="200" y="200" text-anchor="middle">?</text>
      <text class="placeholder-hint" x="200" y="240" text-anchor="middle">학습이 시작되면 빌드됩니다</text>
    </g>

    <!-- step1: 'CENTRAL' 키워드 -->
    <g id="cpu-step1" class="fade-hidden">
      <rect class="active-area" x="60" y="65" width="280" height="245" rx="10"/>
      <text class="label-keyword cpu" x="200" y="180" text-anchor="middle" style="font-size:28px;">CENTRAL</text>
      <text x="200" y="208" text-anchor="middle" style="font-size:13px;fill:#aaa;font-weight:500;">Processing Unit</text>
      <text class="help-text" x="200" y="248" text-anchor="middle">→ 이전 구조와의 대비에서 온 이름</text>
    </g>

    <!-- step2: 분리된 회로 3개 + 범용성 부재 -->
    <g id="cpu-step2" class="fade-hidden">
      <rect class="active-area" x="60" y="65" width="280" height="245" rx="10"/>
      <rect class="legacy-circuit" x="75" y="100" width="80" height="55" rx="4"/>
      <text class="legacy-label" x="115" y="123" text-anchor="middle">[연산]</text>
      <text class="legacy-label" x="115" y="143" text-anchor="middle">곱셈전용</text>

      <rect class="legacy-circuit" x="160" y="100" width="80" height="55" rx="4"/>
      <text class="legacy-label" x="200" y="123" text-anchor="middle">[제어]</text>
      <text class="legacy-label" x="200" y="143" text-anchor="middle">분기전용</text>

      <rect class="legacy-circuit" x="245" y="100" width="80" height="55" rx="4"/>
      <text class="legacy-label" x="285" y="123" text-anchor="middle">[저장]</text>
      <text class="legacy-label" x="285" y="143" text-anchor="middle">덧셈전용</text>

      <text class="legacy-warn" x="200" y="195" text-anchor="middle" style="font-size:12px;">⚠ 프로그램 1개 = 회로 1개</text>
      <text class="help-text" x="200" y="220" text-anchor="middle">새 일에 회로 자체를 바꿔야 함</text>
      <text class="help-text" x="200" y="248" text-anchor="middle" style="fill:#ff8c66;">→ "범용성 부재"</text>
    </g>

    <!-- completed: CPU 박스 + 3요소 (영구 박힘) -->
    <g id="cpu-completed" class="fade-hidden">
      <rect class="cpu-box" x="65" y="75" width="270" height="225" rx="8"/>
      <text class="label-name" x="200" y="100" text-anchor="middle" fill="#ff8c66">CPU</text>
      <text class="label-sub" x="200" y="118" text-anchor="middle">Central Processing Unit</text>

      <rect class="cpu-inner" x="80" y="140" width="70" height="60" rx="4"/>
      <text class="label-data" x="115" y="165" text-anchor="middle" fill="#ffb599">제어장치</text>
      <text class="label-sub" x="115" y="183" text-anchor="middle">F · D</text>

      <rect class="cpu-inner" x="165" y="140" width="70" height="60" rx="4"/>
      <text class="label-data" x="200" y="165" text-anchor="middle" fill="#ffb599">ALU</text>
      <text class="label-sub" x="200" y="183" text-anchor="middle">E</text>

      <rect class="cpu-inner" x="250" y="140" width="70" height="60" rx="4"/>
      <text class="label-data" x="285" y="165" text-anchor="middle" fill="#ffb599">레지스터</text>
      <text class="label-sub" x="285" y="183" text-anchor="middle">초고속</text>

      <path d="M 115 215 L 115 240 L 285 240 L 285 215" class="flow-arrow"/>
      <text class="label-sub" x="200" y="262" text-anchor="middle">F → D → E 사이클</text>
      <text class="label-sub" x="200" y="282" text-anchor="middle" style="fill:#7ee0c8;">어떤 명령어든 처리 ✓</text>
    </g>

    <!-- ============================================================
         RAM AREA  (x: 380~840, w: 460)
         ============================================================ -->

    <!-- placeholder: 미학습 -->
    <g id="ram-placeholder">
      <rect class="placeholder-box" x="380" y="65" width="460" height="245" rx="10"/>
      <text class="placeholder-q" x="610" y="200" text-anchor="middle">?</text>
      <text class="placeholder-hint" x="610" y="240" text-anchor="middle">학습이 시작되면 빌드됩니다</text>
    </g>

    <!-- transition highlight: 전환 답 공개 시 ?가 강조 -->
    <g id="ram-transition" class="fade-hidden">
      <rect class="placeholder-box highlight" x="380" y="65" width="460" height="245" rx="10"/>
      <text class="placeholder-q highlight" x="610" y="190" text-anchor="middle">?</text>
      <text x="610" y="225" text-anchor="middle" style="fill:#dbb5ee;font-size:13px;font-weight:600;">→ 여기에 무엇이 와야 할까?</text>
      <text x="610" y="248" text-anchor="middle" style="fill:#aaa;font-size:11px;">CPU가 처리할 데이터를 둘 공간이 필요함</text>
    </g>

    <!-- step1: Random Access 키워드 + 셀 격자 -->
    <g id="ram-step1" class="fade-hidden">
      <rect class="active-area" x="380" y="65" width="460" height="245" rx="10"/>
      <text class="label-keyword" x="610" y="100" text-anchor="middle" style="font-size:18px;">RANDOM ACCESS</text>
      <text class="label-sub" x="610" y="120" text-anchor="middle">— 어느 셀이든 동일 속도 —</text>

      <rect class="ram-cell" x="430" y="140" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="495" y="140" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="560" y="140" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="625" y="140" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="690" y="140" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="755" y="140" width="60" height="40" rx="3"/>

      <rect class="ram-cell" x="430" y="190" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="495" y="190" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="560" y="190" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="625" y="190" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="690" y="190" width="60" height="40" rx="3"/>
      <rect class="ram-cell" x="755" y="190" width="60" height="40" rx="3"/>

        meta: "JVM도 OS에서 RAM을 받는 하나의 프로그램이고, 받은 RAM을 Heap·Stack·메서드 영역으로 쪼개 쓴다는 한 단계 위 관점이 RAM 복습에서 잡혔음. → RAM 위에서 모든 애플리케이션이 돌아간다는 그림.",

      }
    ],
    completeMsg: "P2 완료 — CPU + RAM + Storage 시스템 빌드. (다음 프로토타입에서 P3 System Bus·P4 Storage·P5 IO Device·P6 요청 흐름까지 확장 예정)"
  }
};

// ── State machine ───────────────────────────────────────────────────
const state = {
  phase: 'p1',     // 'p1' | 'transition' | 'p2'
  step: 0,         // index into phase steps (transition has no index)
  revealed: false  // current step's answer revealed?
};

// ── Element refs ────────────────────────────────────────────────────
const els = {
  stageWrap:   document.getElementById('stageWrap'),
  qLabel:      document.getElementById('qLabel'),
  qText:       document.getElementById('qText'),
  mineText:    document.getElementById('mineText'),
  actualText:  document.getElementById('actualText'),
  metaText:    document.getElementById('metaText'),
  metaNote:    document.getElementById('metaNote'),
  answerBlock: document.getElementById('answerBlock'),
  inputWrap:   document.getElementById('inputWrap'),
  myAnswer:    document.getElementById('myAnswer'),
  submitBtn:   document.getElementById('submitBtn'),
  nextBtn:     document.getElementById('nextBtn'),
  resetBtn:    document.getElementById('resetBtn'),
  qaPanel:     document.getElementById('qaPanel'),
  phaseBar:    document.getElementById('phaseBar')
};

// SVG groups by area
const CPU_GROUPS = ['cpu-placeholder', 'cpu-step1', 'cpu-step2', 'cpu-completed'];
const RAM_GROUPS = ['ram-placeholder', 'ram-transition', 'ram-step1', 'ram-step2', 'ram-completed'];

function setVisible(id, visible) {
  const el = document.getElementById(id);
  if (!el) return;
  if (visible) el.classList.remove('fade-hidden');
  else         el.classList.add('fade-hidden');
}

// Map step index to part state name.
// idx: 0=placeholder, 1=step1, 2=step2, 3=completed
function stepIdxToPart(idx) {
  if (idx <= 0) return 'placeholder';
  if (idx >= 3) return 'completed';
  return `step${idx}`;
}

// Derive each area's display state from (phase, step, revealed).
// Key idea: completed parts stay on stage forever — only the active area changes within itself.
function computePartStates() {
  const out = { cpu: 'placeholder', ram: 'placeholder', connection: false, sysComplete: false };

  if (state.phase === 'p1') {
    // CPU is the active area. Before reveal, show previous step's visual; after reveal, show current step's visual.
    const idx = state.revealed ? state.step + 1 : state.step;
    out.cpu = stepIdxToPart(idx);
    out.ram = 'placeholder';
  } else if (state.phase === 'transition') {
    // CPU is permanently completed (built in P1). RAM area highlights when transition Q is answered.
    out.cpu = 'completed';
    out.ram = state.revealed ? 'transition' : 'placeholder';
  } else if (state.phase === 'p2') {
    // CPU stays completed. RAM is the active area.
    out.cpu = 'completed';
    const idx = state.revealed ? state.step + 1 : state.step;
    out.ram = stepIdxToPart(idx);
    if (out.ram === 'completed') {
      out.connection = true;
      out.sysComplete = true;
    }
  } else if (state.phase === 'complete') {
    out.cpu = 'completed';
    out.ram = 'completed';
    out.connection = true;
    out.sysComplete = true;
  }
  return out;
}

function renderStage() {
  const s = computePartStates();
  CPU_GROUPS.forEach(id => setVisible(id, false));
  setVisible(`cpu-${s.cpu}`, true);
  RAM_GROUPS.forEach(id => setVisible(id, false));
  setVisible(`ram-${s.ram}`, true);
  setVisible('connection-layer', s.connection);
  setVisible('system-complete-label', s.sysComplete);
}

function setStepLabel(label) {
  els.stageWrap.setAttribute('data-step-label', label);
}

function updatePhasePills() {
  const pills = els.phaseBar.querySelectorAll('.phase-pill[data-phase]');
  pills.forEach(p => {
    const ph = p.dataset.phase;
    p.classList.remove('active', 'done', 'locked');
    if (ph === '1') {
      if (state.phase === 'p1')                     p.classList.add('active');
      else if (state.phase === 'transition' || state.phase === 'p2') p.classList.add('done');
    } else if (ph === '2') {
      if (state.phase === 'p2')                     p.classList.add('active');
      else if (state.phase === 'p1' || state.phase === 'transition') p.classList.add('locked');
    }
  });
}

// Holds the active step's answer/meta so submit handler can read it
let currentStepData = null;

// ── Render current state ────────────────────────────────────────────
function render() {
  updatePhasePills();
  els.answerBlock.classList.remove('show');
  state.revealed = false;

  // Reset input area
  els.inputWrap.style.display = '';
  els.myAnswer.value = '';
  els.myAnswer.disabled = false;
  els.submitBtn.disabled = false;
  els.myAnswer.focus();

  if (state.phase === 'p1' || state.phase === 'p2') {
    const phaseData = data[state.phase];
    const stepData = phaseData.steps[state.step];
    currentStepData = stepData;

    els.qLabel.textContent = `Q${state.step + 1}`;
    els.qLabel.classList.remove('transition');
    els.qText.classList.remove('transition');
    els.qText.textContent = stepData.q;
    els.metaNote.style.display = '';

    // Stage reflects current part states (active area shows previous step's visual until reveal)
    renderStage();
    setStepLabel(`${phaseData.phaseLabel} · 질문 ${state.step + 1}/3`);
  } else if (state.phase === 'transition') {
    currentStepData = data.transition;
    els.qLabel.textContent = 'PHASE 전환';
    els.qLabel.classList.add('transition');
    els.qText.classList.add('transition');
    els.qText.textContent = data.transition.q;
    els.metaNote.style.display = 'none';

    // CPU stays completed (P1 result), RAM area still placeholder until transition reveal
    renderStage();
    setStepLabel('P1 → P2 전환 질문');
  } else if (state.phase === 'complete') {
    showCompletionUI();
  }
}

// ── Submit (compare my answer vs actual) ────────────────────────────
function submitAnswer() {
  if (state.revealed) return;
  state.revealed = true;

  const mine = els.myAnswer.value.trim();
  if (mine.length === 0) {
    els.mineText.textContent = '(스킵 — 답을 떠올리지 않고 넘어감)';
    els.mineText.classList.add('skipped');
  } else {
    els.mineText.textContent = mine;
    els.mineText.classList.remove('skipped');
  }
  els.actualText.innerHTML = currentStepData.a;
  if (currentStepData.meta) {
    els.metaText.innerHTML = currentStepData.meta;
    els.metaNote.style.display = '';
  } else {
    els.metaNote.style.display = 'none';
  }

  els.myAnswer.disabled = true;
  els.submitBtn.disabled = true;
  els.answerBlock.classList.add('show');

  // Stage evolves: active area moves forward; completed parts remain on stage
  renderStage();

  if (state.phase === 'p1' || state.phase === 'p2') {
    const phaseData = data[state.phase];
    setStepLabel(`${phaseData.phaseLabel} · 진화 ${state.step + 1}/3 ✓`);
  } else if (state.phase === 'transition') {
    setStepLabel('전환 답 공개 ✓');
  }
}

els.submitBtn.addEventListener('click', submitAnswer);

// Cmd/Ctrl + Enter to submit from textarea
els.myAnswer.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    submitAnswer();
  }
});

// ── Next ────────────────────────────────────────────────────────────
els.nextBtn.addEventListener('click', () => {
  if (state.phase === 'p1') {
    if (state.step < 2) {
      state.step += 1;
      render();
    } else {
      // P1 done → transition
      state.phase = 'transition';
      render();
    }
  } else if (state.phase === 'transition') {
    // Move to P2
    state.phase = 'p2';
    state.step = 0;
    render();
  } else if (state.phase === 'p2') {
    if (state.step < 2) {
      state.step += 1;
      render();
    } else {
      // P2 done
      state.phase = 'complete';
      render();
    }
  }
});

function showCompletionUI() {
  updatePhasePills();
  renderStage();
  setStepLabel('빌드 완료 ✓');

  els.qLabel.textContent = '✓';
  els.qLabel.classList.remove('transition');
  els.qText.classList.remove('transition');
  els.qText.textContent = '빌드업 N=1 프로토타입 완료';

  els.inputWrap.style.display = 'none';
  els.answerBlock.classList.add('show');
  // Hide comparison cards, show only completion message in actual side
  els.mineText.parentElement.style.display = 'none';
  els.actualText.innerHTML = data.p2.completeMsg;
  els.metaNote.innerHTML = `
    <span class="meta-label">🧪 형태 검증 포인트</span>
    이 프로토타입의 핵심: (1) 답을 직접 입력해야 시각이 변함 — 능동 회상 강제 작동? (2) 내 답 vs 실제 답 비교가 회상 효과 강화? (3) 페이즈 전환 질문이 부품 간 인과를 만듦? (4) "내가 빌드했다"는 소유감 — 정적 조감 대비 차이가 느껴졌나?
  `;
  els.nextBtn.style.display = 'none';
}

// ── Reset ───────────────────────────────────────────────────────────
els.resetBtn.addEventListener('click', () => {
  state.phase = 'p1';
  state.step = 0;
  state.revealed = false;
  els.nextBtn.style.display = '';
  // Restore comparison card that completion UI hides
  els.mineText.parentElement.style.display = '';
  els.mineText.classList.remove('skipped');
  render();
});

// ── Initial render ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
